<!doctype html>
<html lang="en" class="dark">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
        />
        <title>GridironFrontOffice Desktop</title>
        <base href="/" />
        <link rel="stylesheet" href="GridironFrontOffice.Desktop.styles.css" />
        <link rel="icon" href="data:," />

        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            primary: {
                                DEFAULT: "#2563EB",
                                light: "#3B82F6",
                                dark: "#1D4ED8",
                            },
                            secondary: "#475569",
                            surface: {
                                DEFAULT: "#1A1F3A",
                                elevated: "#151a36",
                                hover: "#2a3254",
                            },
                            canvas: "#0A0E27",
                            frost: "#F1F5F9",
                            muted: "#94A3B8",
                            success: "#38B000",
                            warning: "#FFB703",
                            error: "#C1121F",
                            info: "#00B4D8",
                            divider: "#475569",
                        },
                        fontFamily: {
                            sans: [
                                "Inter",
                                "system-ui",
                                "-apple-system",
                                "sans-serif",
                            ],
                        },
                    },
                },
            };
        </script>
        <link
            rel="stylesheet"
            href="_content/GridironFrontOffice.UI/styles/app.css"
        />
    </head>

    <body class="bg-canvas text-frost font-sans m-0 p-0 antialiased">
        <div class="status-bar-safe-area"></div>

        <div id="app">Loading...</div>

        <div id="blazor-error-ui" data-nosnippet>
            An unhandled error has occurred.
            <a href="." class="reload">Reload</a>
            <span class="dismiss">🗙</span>
        </div>

        <script src="_framework/blazor.webview.js" autostart="false"></script>
    </body>
</html>
